[build]
  command   = "npm install && cd apps/web && npm install && npm run build:vendor"
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# This is the correct way to set a global timeout now
[functions."*"]
  timeout = 26

# ── Scheduled cache pre-warmer (runs every hour) ──────────────────────────────
# Proactively refreshes shared Supabase cache before TTLs expire.
# Cache hits return immediately (0 external API calls); only stale entries
# trigger real upstream requests. Comtrade: ~9 real calls/day (well under 500/day limit).
[functions."cache-warmer"]
  schedule = "0 * * * *"
  timeout  = 120

[functions."fetch-traffic"]
  timeout = 26

[functions."fetch-supplemental"]
  timeout = 15

[functions."fetch-maritime-supplement"]
  timeout = 20

[functions."ais-vessels"]
  timeout = 26

[functions."fetch-reliefweb"]
  timeout = 15

[functions."fetch-firms"]
  timeout = 26

[functions."fetch-gdacs"]
  timeout = 26

[functions."fetch-gdelt"]
  timeout = 26

[functions."fetch-bdi"]
  timeout = 26

[functions."calculate-risk"]
  timeout = 15

[functions."create-checkout-session"]
  timeout = 10

[functions."stripe-webhook"]
  timeout = 10

[[redirects]]
  from   = "/adsb/api/*"
  to     = "https://opendata.adsb.fi/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
